<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MediStore Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#4f46e5",
              secondary: "#818cf8",
              accent: "#10b981",
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>
  </head>
  <body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md animate-fade-in border border-gray-200">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-primary mb-4 shadow-sm">
          <i class="fas fa-heartbeat text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">MediStore Pro</h1>
        <p class="text-gray-500 text-sm mt-1">Secure Management Portal</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %} 
      {% if messages %}
      <div class="space-y-3 mb-6">
        {% for category, message in messages %}
        <div class="px-4 py-3 rounded-lg flex items-start gap-3 text-sm shadow-sm
          {% if category == 'success' %}bg-green-50 text-green-800 border border-green-200
          {% elif category == 'danger' %}bg-red-50 text-red-800 border border-red-200
          {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
          <i class="fas fa-{% if category=='success' %}check{% elif category=='danger' %}exclamation{% else %}info{% endif %}-circle mt-0.5 text-lg"></i>
          <span>{{ message|safe }}</span>
        </div>
        {% endfor %}
      </div>
      {% endif %} 
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
        <div>
          <label class="block mb-1.5 text-sm font-medium text-gray-700">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-gray-400"></i>
            </div>
            <input
              type="text"
              name="username"
              id="username"
              required
              placeholder="Enter your username"
              class="w-full pl-10 pr-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none shadow-sm"
            />
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-sm font-medium text-gray-700">Password</label>
            <a href="{{ url_for('forgot_password') }}" class="text-xs font-semibold text-primary hover:text-indigo-700 hover:underline">
              Forgot Password?
            </a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input
              type="password"
              name="password"
              id="password"
              required
              placeholder="Enter your password"
              class="w-full pl-10 pr-3 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none shadow-sm"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-primary hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2"
        >
          <span>Sign In</span>
          <i class="fas fa-arrow-right text-sm"></i>
        </button>
      </form>

      <div class="mt-6 text-center border-t border-gray-100 pt-4">
        <p class="text-sm text-gray-600">
          Don't have an account? 
          <a href="{{ url_for('signup') }}" class="font-bold text-primary hover:text-indigo-800 hover:underline transition-colors">
            Create Account
          </a>
        </p>
      </div>

    </div>

    <script>
      function fillOwnerCredentials() {
        document.getElementById("username").value = "admin";
        document.getElementById("password").value = "admin123";
      }

      function fillStaffCredentials() {
        document.getElementById("username").value = "staff";
        document.getElementById("password").value = "staff123";
      }

      function toggleDemo() {
        const demoBox = document.getElementById('demo-creds');
        demoBox.classList.toggle('hidden');
      }
    </script>
  </body>
</html>
