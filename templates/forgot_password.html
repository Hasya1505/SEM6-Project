<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediStore Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
</head>
<body class="bg-gradient-to-br from-indigo-600 via-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="p-8 pb-4 text-center">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Forgot Password?</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="px-8 mb-2">
                {% for category, message in messages %}
                <div class="p-3 rounded-md text-sm mb-2 break-words
                    {% if category == 'success' %}bg-green-50 text-green-700 border border-green-200
                    {% elif category == 'info' %}bg-blue-50 text-blue-700 border border-blue-200
                    {% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
                    {{ message|safe }}
                </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="POST" class="px-8 pb-8 pt-4 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="Enter your registered email"
                        class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition-all shadow-md hover:shadow-lg">
                Send Reset Link
            </button>
            
            <a href="{{ url_for('login') }}" class="block w-full text-center py-2.5 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 font-medium transition-colors">
                Back to Login
            </a>
        </form>
    </div>
</body>
</html>
